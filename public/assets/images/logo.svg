  <circle cx="30" cy="30" r="8" fill="white"/>
  <g fill="white">
    <rect x="28" y="5" width="4" height="10" rx="2"/>
    <rect x="28" y="45" width="4" height="10" rx="2"/>
    <rect x="5" y="28" width="10" height="4" rx="2"/>
    <rect x="45" y="28" width="10" height="4" rx="2"/>
    <rect x="11" y="11" width="4" height="8" rx="2" transform="rotate(45 13 15)"/>
    <rect x="45" y="11" width="4" height="8" rx="2" transform="rotate(-45 47 15)"/>
    <rect x="11" y="41" width="4" height="8" rx="2" transform="rotate(-45 13 45)"/>
    <rect x="45" y="41" width="4" height="8" rx="2" transform="rotate(45 47 45)"/>
  </g>
  <!-- Text -->
  <text x="65" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="800" fill="#4A2D7A">CERDAS</text>
  <text x="65" y="45" font-family="Arial, sans-serif" font-size="14" font-weight="800" fill="#E91E8C">BERKARAKTER</text>
</svg>
